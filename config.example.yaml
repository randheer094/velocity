# velocity config.example.yaml
#
# Copy to ~/.velocity/config.yaml (or <--dir>/config.yaml) and edit.
# Secrets and the full Postgres connection live in env vars, never here:
#   JIRA_API_TOKEN, GH_TOKEN,
#   JIRA_WEBHOOK_SECRET, GH_WEBHOOK_SECRET,
#   VELOCITY_DB_HOST, VELOCITY_DB_PORT, VELOCITY_DB_USER,
#   VELOCITY_DB_PASSWORD, VELOCITY_DB_NAME

jira:
  base_url: https://your-org.atlassian.net
  email: you@example.com
  architect_jira_id: 5b10ac8d82e05b22cc7d4ef5
  developer_jira_id: 5b10ac8d82e05b22cc7d4ef5
  repo_url_field: customfield_10050
  task_status_map:
    new:
      default: New
    planning:
      default: Planning
    planning_failed:
      default: Planning Failed
    coding:
      default: Subtask In progress
    done:
      default: Done
      aliases: [Dismissed]
  subtask_status_map:
    new:
      default: Ready for Dev
    coding:
      default: Dev In Progress
    coding_failed:
      default: Dev Failed
    in_review:
      default: In Review
    done:
      default: Done
      aliases: [Dismissed]

llm:
  arch:
    provider: claude_cli
    model: claude-opus-4-6
    allowed_tools: Read Glob Grep LS
    permission_mode: bypassPermissions
    timeout_sec: 600
  code:
    provider: claude_cli
    model: claude-sonnet-4-6
    allowed_tools: Read Write Edit Glob Grep LS MultiEdit Bash
    permission_mode: bypassPermissions
    timeout_sec: 1800

server:
  host: 0.0.0.0
  port: 8000
  max_concurrency: 1   # llm-queue workers (arch.Run / code.Run / code.Iterate); ops queue is always 1 worker
  queue_size: 1024     # soft cap on pending rows per queue

# resources pins the velocity-resources release tarball that populates
# ~/.velocity/resources. Set by `velocity setup`; refreshed by
# `velocity update-prompts`. Edit by hand only if you know what you're
# doing — the binary's prompt schema is pinned to a single major.
resources:
  repo_slug: ""        # <owner>/<repo>, e.g. randheer094/velocity-resources
  version: ""          # release tag extracted to disk, e.g. v0.6.0
  fetch_timeout_sec: 30
