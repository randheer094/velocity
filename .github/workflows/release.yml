name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  check-major:
    name: Verify release tag matches version.Major
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Compare tag major to version.Major
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: ./scripts/check-major.sh "$RELEASE_TAG"

  build:
    name: Build ${{ matrix.asset }}
    needs: check-major
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm64
            asset: velocity-macos-arm64
          - goarch: amd64
            asset: velocity-macos-x86_64
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          go build \
            -ldflags="-s -w -X github.com/randheer094/velocity/internal/version.Tag=$RELEASE_TAG" \
            -o ${{ matrix.asset }} ./cmd/velocity

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
