name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm64
            asset: velocity-macos-arm64
          - goarch: amd64
            asset: velocity-macos-x86_64
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o ${{ matrix.asset }} ./cmd/velocity

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

  badge:
    name: Update release badge
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate and push release.svg to wiki
        env:
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          set -eu
          LABEL="release"
          VALUE="$TAG"
          LW=$(( ${#LABEL} * 7 + 10 ))
          VW=$(( ${#VALUE} * 7 + 10 ))
          TOTAL=$(( LW + VW ))
          LX=$(( LW / 2 ))
          VX=$(( LW + VW / 2 ))
          cat > release.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="$TOTAL" height="20" role="img" aria-label="$LABEL: $VALUE">
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r"><rect width="$TOTAL" height="20" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#r)">
              <rect width="$LW" height="20" fill="#555"/>
              <rect x="$LW" width="$VW" height="20" fill="#007ec6"/>
              <rect width="$TOTAL" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
              <text x="$LX" y="14">$LABEL</text>
              <text x="$VX" y="14">$VALUE</text>
            </g>
          </svg>
          EOF
          git clone "https://x-access-token:$TOKEN@github.com/$REPO.wiki.git" wiki
          cp release.svg wiki/release.svg
          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release.svg
          git diff --cached --quiet && exit 0
          git commit -m "release badge: $TAG"
          git push
