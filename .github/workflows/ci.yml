name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: vet + test + cross-compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch tags so `git describe` works

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: go vet
        run: go vet ./...

      - name: go test with coverage
        run: ./scripts/test-db.sh -coverprofile=coverage.out -covermode=atomic ./...

      - name: Publish coverage badge to badges branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          int=${pct%.*}
          if [ "$int" -lt 50 ]; then color=red
          elif [ "$int" -lt 80 ]; then color=yellow
          else color=brightgreen
          fi
          tmp=$(mktemp -d)
          curl -sSLo "$tmp/coverage.svg" "https://img.shields.io/badge/coverage-${pct}%25-${color}"
          cd "$tmp"
          git init -q -b badges
          git -c user.name=velocity-ci -c user.email=ci@velocity add coverage.svg
          git -c user.name=velocity-ci -c user.email=ci@velocity commit -q -m "coverage: ${pct}%"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" badges

      - name: Resolve version tag
        id: vtag
        run: |
          set -euo pipefail
          TAG=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: cross-compile darwin/arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          VTAG: ${{ steps.vtag.outputs.tag }}
        run: |
          go build \
            -ldflags="-s -w -X github.com/randheer094/velocity/internal/version.Tag=$VTAG" \
            -o /tmp/velocity-arm64 ./cmd/velocity

      - name: cross-compile darwin/amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          VTAG: ${{ steps.vtag.outputs.tag }}
        run: |
          go build \
            -ldflags="-s -w -X github.com/randheer094/velocity/internal/version.Tag=$VTAG" \
            -o /tmp/velocity-amd64 ./cmd/velocity
